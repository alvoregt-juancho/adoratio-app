<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia | Adoratio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #000;">
    <div class="premium-sheet-overlay active">
        <div class="sheet-window">
            <div class="custodia-container">
                <svg viewBox="0 0 200 300" width="120" height="180">
                    <defs>
                        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#DBBF7C" />
                            <stop offset="50%" style="stop-color:#CDB16E" />
                            <stop offset="80%" style="stop-color:#C1A364" />
                            <stop offset="100%" style="stop-color:#B6924D" />
                        </linearGradient>
                    </defs>
                    <circle cx="100" cy="150" r="35" fill="#FFF" stroke="#DBBF7C" stroke-width="2"/>
                    <path d="M100 50 L100 250 M50 150 L150 150 M70 80 L130 220 M130 80 L70 220" stroke="url(#goldGrad)" stroke-width="4"/>
                </svg>
            </div>
            <h2 class="sheet-title">Asistencia</h2>
            <p class="sheet-caption" id="qrInfo">Confirma tu llegada a la capilla.</p>
            <div class="booking-input-group">
                <input type="tel" id="userPhone" class="touch-input-field phone-digits-input" autocomplete="tel-national" inputmode="numeric" pattern="[0-9]*" maxlength="8"
                    placeholder="8 dígitos de tu celular" style="background:#fff;color:#000;">
            </div>
            <button class="sheet-primary-btn" id="checkinBtn" onclick="executeCommitment()">CONFIRMAR ASISTENCIA</button>
            <div id="result" class="result-box"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
